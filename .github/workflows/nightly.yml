name: Playwright Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 6 * * *'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pytest playwright pytest-playwright pytest-html

      - name: Install Playwright browsers
        run: playwright install chromium

      - name: Run tests
        run: |
          cd playwright-kau
          pytest tests/ --browser chromium --screenshot only-on-failure --html=report.html --self-contained-html
        continue-on-error: true

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-kau/report.html

  publish-report:
    needs: test
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Download test report
        uses: actions/download-artifact@v4
        with:
          name: playwright-report
          path: playwright-kau/

      - name: Deploy report to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: playwright-kau/
