name: Playwright Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 6 * * *'  # Run every day at 6am UTC (nightly)

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pytest playwright pytest-playwright

      - name: Install Playwright browsers
        run: playwright install chromium

      - name: Run tests
        run: |
          cd playwright-kau
          pytest tests/ --browser chromium --screenshot only-on-failure --html=report.html --self-contained-html
        continue-on-error: true

      - name: Upload test report
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: playwright-report
          path: playwright-kau/report.html

      - name: Upload screenshots on failure
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: screenshots
          path: playwright-kau/test-results/
